name: Auto Update 

on:
  schedule:
    - cron: '0 */3 * * *' # Har 3 ghante me chalega
  workflow_dispatch: # Taki aap manually bhi click karke run kar sakein

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push if JSON changed
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add stickers.json
        git diff-index --quiet HEAD || git commit -m "Auto-updated streams.json [skip ci]"
        git push
